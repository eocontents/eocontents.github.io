// ═══════════════════════════════════════════════════════════════
// SOUND ENGINE (SFX via Web Audio API + BGM via HTML Audio)
// ═══════════════════════════════════════════════════════════════
const BGM_BASE = "./assets/audio/";
const BGM_TRACKS = {
  menu: BGM_BASE + "bgm_menu.mp3",
  play: BGM_BASE + "bgm_play.mp3",
  tense: BGM_BASE + "bgm_tense.mp3",
  result: BGM_BASE + "bgm_result.mp3",
};

class SoundEngine {
  constructor() {
    this.ctx = null;
    this.enabled = true;
    this.bgmEnabled = true;
    this.bgmVolume = 0.4;
    this.currentBgm = null;
    this.currentBgmKey = null;
    this.bgmAudio = null;
  }
  init() {
    if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (this.ctx.state === "suspended") this.ctx.resume();
  }
  playBgm(key) {
    if (this.currentBgmKey === key && this.bgmAudio && !this.bgmAudio.paused) return;
    this.stopBgm();
    if (!this.bgmEnabled) return;
    const url = BGM_TRACKS[key];
    if (!url) return;
    try {
      this.bgmAudio = new Audio(url);
      this.bgmAudio.volume = this.bgmVolume;
      this.bgmAudio.loop = (key !== "result");
      this.currentBgmKey = key;
      const playPromise = this.bgmAudio.play();
      if (playPromise) playPromise.catch(() => {});
    } catch (e) {}
  }
  stopBgm() {
    if (this.bgmAudio) {
      this.bgmAudio.pause();
      this.bgmAudio.currentTime = 0;
      this.bgmAudio = null;
      this.currentBgmKey = null;
    }
  }
  pauseBgm() {
    if (this.bgmAudio && !this.bgmAudio.paused) this.bgmAudio.pause();
  }
  resumeBgm() {
    if (this.bgmAudio && this.bgmAudio.paused && this.bgmEnabled) {
      const p = this.bgmAudio.play();
      if (p) p.catch(() => {});
    }
  }
  setBgmEnabled(on) {
    this.bgmEnabled = on;
    if (!on) this.stopBgm();
  }
  crossfadeTo(key) {
    if (this.currentBgmKey === key) return;
    if (this.bgmAudio) {
      const old = this.bgmAudio;
      let vol = old.volume;
      const fade = setInterval(() => {
        vol -= 0.05;
        if (vol <= 0) { clearInterval(fade); old.pause(); old.currentTime = 0; }
        else old.volume = vol;
      }, 50);
    }
    this.bgmAudio = null;
    this.currentBgmKey = null;
    setTimeout(() => this.playBgm(key), 300);
  }
  play(type) {
    if (!this.enabled || !this.ctx) return;
    try {
      const t = this.ctx.currentTime;
      const o = this.ctx.createOscillator();
      const g = this.ctx.createGain();
      o.connect(g);
      g.connect(this.ctx.destination);
      switch (type) {
        case "toggle":
          o.frequency.value = 800; o.type = "sine";
          g.gain.setValueAtTime(0.35, t);
          g.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
          o.start(t); o.stop(t + 0.1); break;
        case "keypress":
          o.frequency.value = 600; o.type = "sine";
          g.gain.setValueAtTime(0.25, t);
          g.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
          o.start(t); o.stop(t + 0.08); break;
        case "correct":
          o.frequency.setValueAtTime(523, t);
          o.frequency.setValueAtTime(659, t + 0.1);
          o.frequency.setValueAtTime(784, t + 0.2);
          o.type = "sine";
          g.gain.setValueAtTime(0.4, t);
          g.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
          o.start(t); o.stop(t + 0.5); break;
        case "wrong":
          o.frequency.setValueAtTime(300, t);
          o.frequency.setValueAtTime(200, t + 0.15);
          o.type = "square";
          g.gain.setValueAtTime(0.15, t);
          g.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
          o.start(t); o.stop(t + 0.35); break;
        case "combo":
          [523, 659, 784, 1047].forEach((f, i) => {
            const o2 = this.ctx.createOscillator();
            const g2 = this.ctx.createGain();
            o2.connect(g2); g2.connect(this.ctx.destination);
            o2.frequency.value = f; o2.type = "sine";
            g2.gain.setValueAtTime(0.15, t + i * 0.08);
            g2.gain.exponentialRampToValueAtTime(0.001, t + i * 0.08 + 0.2);
            o2.start(t + i * 0.08); o2.stop(t + i * 0.08 + 0.2);
          }); o.stop(t); break;
        case "levelclear":
          [523, 659, 784, 1047, 1319].forEach((f, i) => {
            const o2 = this.ctx.createOscillator();
            const g2 = this.ctx.createGain();
            o2.connect(g2); g2.connect(this.ctx.destination);
            o2.frequency.value = f; o2.type = "sine";
            g2.gain.setValueAtTime(0.2, t + i * 0.12);
            g2.gain.exponentialRampToValueAtTime(0.001, t + i * 0.12 + 0.5);
            o2.start(t + i * 0.12); o2.stop(t + i * 0.12 + 0.5);
          }); o.stop(t); break;
        case "gameover":
          o.frequency.setValueAtTime(400, t);
          o.frequency.linearRampToValueAtTime(150, t + 0.8);
          o.type = "sawtooth";
          g.gain.setValueAtTime(0.12, t);
          g.gain.exponentialRampToValueAtTime(0.001, t + 1);
          o.start(t); o.stop(t + 1); break;
        case "newrow":
          o.frequency.value = 440; o.type = "sine";
          g.gain.setValueAtTime(0.05, t);
          g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
          o.start(t); o.stop(t + 0.15); break;
        case "click":
          o.frequency.value = 700; o.type = "sine";
          g.gain.setValueAtTime(0.1, t);
          g.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
          o.start(t); o.stop(t + 0.05); break;
        default: o.stop(t);
      }
    } catch (e) {}
  }
}

const DIGITS = "0123456789ABCDEF";
function toBase(decimal, base) {
  if (decimal === 0) return "0";
  let r = "", n = decimal;
  while (n > 0) { r = DIGITS[n % base] + r; n = Math.floor(n / base); }
  return r;
}
function fromBase(str, base) {
  let r = 0;
  for (let i = 0; i < str.length; i++) r = r * base + DIGITS.indexOf(str[i].toUpperCase());
  return r;
}
function padBinary(bin, bits) { return bin.padStart(bits, "0"); }

function getInitialSave() {
  try {
    const d = JSON.parse(localStorage.getItem("binaryGame"));
    if (d && d.version === "1.0") return d;
  } catch {}
  return {
    version: "1.0",
    character: null,
    sfx: true,
    bgm: true,
    stages: Object.fromEntries(STAGES.map(s => [s.id, {
      levels: Object.fromEntries([1,2,3,4,5].map(l => [l, { cleared: false, stars: 0, high: 0 }])),
      tutorialSeen: false,
    }])),
  };
}

function saveToDisk(data) {
  try { localStorage.setItem("binaryGame", JSON.stringify(data)); } catch {}
}

function isStageUnlocked(save, stageId) {
  const stage = STAGES.find(s => s.id === stageId);
  if (!stage || !stage.unlockReq) return true;
  const req = stage.unlockReq;
  return save.stages[req.stage]?.levels[req.level]?.cleared || false;
}

function getStars(accuracy) {
  if (accuracy >= 90) return 3;
  if (accuracy >= 80) return 2;
  if (accuracy >= 70) return 1;
  return 0;
}

// ═══════════════════════════════════════════════════════════════
// BIT TOGGLE INPUT (auto-submit when correct)
// ═══════════════════════════════════════════════════════════════
function BitToggleRow({ bits, targetDecimal, onCorrect, onWrong }) {
  const [userBits, setUserBits] = useState(new Array(bits).fill(0));
  const submittedRef = useRef(false);

  const toggle = (idx) => {
    if (submittedRef.current) return;
    const nb = [...userBits];
    nb[idx] = nb[idx] ? 0 : 1;
    setUserBits(nb);
    soundEngine.play("toggle");
    const dec = nb.reduce((s, b, i) => s + b * Math.pow(2, bits - 1 - i), 0);
    if (dec === targetDecimal) {
      submittedRef.current = true;
      setTimeout(() => onCorrect(), 150);
    }
  };

  useEffect(() => {
    setUserBits(new Array(bits).fill(0));
    submittedRef.current = false;
  }, [bits, targetDecimal]);

  const cellSz = bits <= 8 ? "clamp(32px, 9vw, 44px)" : "clamp(24px, 6vw, 34px)";

  return (
    <div style={{ display: "flex", gap: 2 }}>
      {userBits.map((b, i) => (
        <button key={i} onClick={() => toggle(i)} style={{
          width: cellSz, height: cellSz,
          borderRadius: 6, border: `1.5px solid ${b ? "#4A7EA6" : C.lightBorder}`,
          background: b ? C.bit1 : C.bit0,
          color: b ? C.white : C.bit0t,
          fontSize: bits <= 8 ? "clamp(14px, 3.5vw, 20px)" : "clamp(11px, 2.5vw, 15px)",
          fontWeight: 700, cursor: "pointer", fontFamily: "'Fira Code', monospace",
          transition: "all 0.12s", padding: 0,
        }}>
          {b}
        </button>
      ))}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// INLINE KEYPAD (compact, appears next to answer cell)
// ═══════════════════════════════════════════════════════════════
function InlineKeypad({ base, onSubmit }) {
  const [input, setInput] = useState("");
  const maxLen = base === 16 ? 4 : 3;

  const press = (ch) => { soundEngine.play("keypress"); if (input.length < maxLen) setInput(input + ch); };
  const backspace = () => { soundEngine.play("keypress"); setInput(input.slice(0, -1)); };
  const submit = () => { if (input.length > 0) { soundEngine.play("click"); onSubmit(input); setInput(""); } };

  useEffect(() => { setInput(""); }, [base]);

  useEffect(() => {
    const handler = (e) => {
      const k = e.key.toUpperCase();
      if (k === "ENTER") { e.preventDefault(); submit(); return; }
      if (k === "BACKSPACE") { e.preventDefault(); backspace(); return; }
      if (base <= 10 && "0123456789".includes(k) && parseInt(k) < base) { e.preventDefault(); press(k); }
      else if (base === 16 && DIGITS.includes(k)) { e.preventDefault(); press(k); }
    };
    window.addEventListener("keydown", handler);
    return () => window.removeEventListener("keydown", handler);
  });

  const btnSz = 32;
  const keys = base === 16
    ? [["7","8","9","A"],["4","5","6","B"],["1","2","3","C"],["0","D","E","F"]]
    : base === 8
    ? [["5","6","7"],["2","3","4"],["0","1"]]
    : [["7","8","9"],["4","5","6"],["1","2","3"],["0"]];

  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6, flexShrink: 0 }} onClick={e => e.stopPropagation()}>
      {/* Answer display */}
      <div style={{
        minWidth: 48, height: 44, borderRadius: 6, background: C.white,
        display: "flex", alignItems: "center", justifyContent: "center",
        fontSize: "clamp(16px, 4vw, 22px)", fontWeight: 700,
        fontFamily: "'Fira Code', monospace", color: C.charcoal,
        border: `2px solid ${C.btn}`, padding: "0 8px",
      }}>
        {input || <span style={{ color: "#ccc" }}>?</span>}
      </div>
      {/* Mini keypad grid */}
      <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
        {keys.map((row, ri) => (
          <div key={ri} style={{ display: "flex", gap: 2 }}>
            {row.map(k => (
              <button key={k} onClick={() => press(k)} style={{
                width: btnSz, height: btnSz, borderRadius: 4,
                border: "none", background: C.btn, color: C.white,
                fontSize: 13, fontWeight: 700, cursor: "pointer",
                fontFamily: "'Fira Code', monospace", padding: 0,
                display: "flex", alignItems: "center", justifyContent: "center",
              }}
              onMouseDown={e => e.target.style.opacity = "0.7"}
              onMouseUp={e => e.target.style.opacity = "1"}
              >{k}</button>
            ))}
          </div>
        ))}
        <div style={{ display: "flex", gap: 2 }}>
          <button onClick={backspace} style={{
            width: btnSz, height: btnSz, borderRadius: 4,
            border: "none", background: C.red, color: C.white,
            fontSize: 14, fontWeight: 700, cursor: "pointer", padding: 0,
            display: "flex", alignItems: "center", justifyContent: "center",
          }}>⌫</button>
          <button onClick={submit} style={{
            flex: 1, height: btnSz, borderRadius: 4,
            border: "none", background: C.charcoal, color: C.white,
            fontSize: 13, fontWeight: 700, cursor: "pointer", padding: 0,
            display: "flex", alignItems: "center", justifyContent: "center",
          }}>✓</button>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// GAME PLAY SCREEN
// ═══════════════════════════════════════════════════════════════
function GamePlay({ stageId, level, charId, save, onResult, onExit }) {
  const stage = STAGES.find(s => s.id === stageId);
  const config = LEVEL_CONFIGS[stageId][level - 1];
  const [rows, setRows] = useState([]);
  const [score, setScore] = useState(0);
  const [combo, setCombo] = useState(0);
  const [maxCombo, setMaxCombo] = useState(0);
  const [correct, setCorrect] = useState(0);
  const [wrong, setWrong] = useState(0);
  const [mood, setMood] = useState("idle");
  const [paused, setPaused] = useState(false);
  const [finished, setFinished] = useState(false);
  const [finishReason, setFinishReason] = useState(null);
  const [activeRow, setActiveRow] = useState(null);
  const [timeLeft, setTimeLeft] = useState(config.timeLimit);
  const [sfxOn, setSfxOn] = useState(soundEngine.enabled);
  const [bgmOn, setBgmOn] = useState(soundEngine.bgmEnabled);
  const generatedRef = useRef(0);
  const answeredRef = useRef(0);
  const rowIdRef = useRef(0);
  const intervalRef = useRef(null);
  const timerRef = useRef(null);
  const correctRef = useRef(0);
  const wrongRef = useRef(0);
  const scoreRef = useRef(0);
  const maxComboRef = useRef(0);

  const generateProblem = useCallback(() => {
    const decimal = Math.floor(Math.random() * (config.max + 1));
    const direction = Math.random() < 0.5 ? "AtoB" : "BtoA";
    const fromB = stage.fromBase;
    const toB = stage.toBase;
    let question, answer, answerBase, inputBase, sourceDisplay;
    if (direction === "AtoB") {
      const srcStr = toBase(decimal, fromB);
      question = `(${fromB}) ${srcStr}`;
      answer = toBase(decimal, toB).toUpperCase();
      answerBase = toB;
      inputBase = toB;
      sourceDisplay = srcStr;
    } else {
      const srcStr = toBase(decimal, toB);
      question = `(${toB}) ${srcStr}`;
      answer = toBase(decimal, fromB).toUpperCase();
      answerBase = fromB;
      inputBase = fromB;
      sourceDisplay = srcStr;
    }
    return {
      id: ++rowIdRef.current, decimal, direction, question, answer,
      answerBase, inputBase, bits: config.bits || 8,
      sourceDisplay, createdAt: Date.now(),
    };
  }, [config, stage]);

  const endGame = useCallback((reason) => {
    if (finished) return;
    setFinished(true);
    setFinishReason(reason);
    clearInterval(intervalRef.current);
    clearInterval(timerRef.current);
    if (reason === "overflow") soundEngine.play("gameover");
    else soundEngine.play("levelclear");
    const answered = correctRef.current + wrongRef.current;
    const unanswered = TOTAL_QUESTIONS - answered;
    const totalWrong = wrongRef.current + unanswered;
    const accuracy = TOTAL_QUESTIONS > 0 ? Math.round(correctRef.current / TOTAL_QUESTIONS * 100) : 0;
    const cleared = correctRef.current >= Math.ceil(TOTAL_QUESTIONS * 0.7) && accuracy >= 70;
    setTimeout(() => {
      onResult({
        score: scoreRef.current, correct: correctRef.current, wrong: totalWrong,
        accuracy, maxCombo: maxComboRef.current, cleared, reason,
        totalQuestions: TOTAL_QUESTIONS,
      });
    }, 1500);
  }, [finished, onResult]);

  const addRow = useCallback(() => {
    if (paused || finished) return;
    setRows(prev => {
      if (generatedRef.current >= TOTAL_QUESTIONS) return prev;
      if (prev.length >= config.maxRows) {
        endGame("overflow");
        return prev;
      }
      soundEngine.play("newrow");
      generatedRef.current++;
      return [...prev, generateProblem()];
    });
  }, [paused, finished, config, generateProblem, endGame]);

  useEffect(() => {
    if (!finished && !paused) {
      addRow();
      intervalRef.current = setInterval(addRow, config.interval);
      timerRef.current = setInterval(() => {
        setTimeLeft(prev => {
          if (prev <= 1) { endGame("timeout"); return 0; }
          return prev - 1;
        });
      }, 1000);
    }
    return () => { clearInterval(intervalRef.current); clearInterval(timerRef.current); };
  }, [paused, finished]);

  const checkAnswer = (rowId, userAnswer) => {
    if (finished) return;
    const row = rows.find(r => r.id === rowId);
    if (!row) return;
    const ua = userAnswer.toUpperCase().replace(/^0+/, "") || "0";
    const ca = row.answer.replace(/^0+/, "") || "0";

    answeredRef.current++;

    if (ua === ca) {
      soundEngine.play("correct");
      const timeBonus = Math.max(0, Math.floor((config.interval - (Date.now() - row.createdAt)) / 100));
      const comboMult = combo >= 9 ? 3 : combo >= 4 ? 2 : combo >= 2 ? 1.5 : 1;
      const pts = Math.round((100 + timeBonus) * comboMult);
      scoreRef.current += pts;
      setScore(s => s + pts);
      setCombo(c => {
        const nc = c + 1;
        if (nc === 3 || nc === 5 || nc === 10) soundEngine.play("combo");
        maxComboRef.current = Math.max(maxComboRef.current, nc);
        setMaxCombo(m => Math.max(m, nc));
        return nc;
      });
      correctRef.current++;
      setCorrect(c => c + 1);
      setMood("happy");
      setTimeout(() => setMood("idle"), 1200);
      setRows(prev => prev.filter(r => r.id !== rowId));
      setActiveRow(null);
    } else {
      soundEngine.play("wrong");
      scoreRef.current = Math.max(0, scoreRef.current - 50);
      setScore(s => Math.max(0, s - 50));
      setCombo(0);
      wrongRef.current++;
      setWrong(w => w + 1);
      setMood("sad");
      setTimeout(() => setMood("idle"), 1500);
      setRows(prev => prev.filter(r => r.id !== rowId));
      setActiveRow(null);
    }

    if (answeredRef.current >= TOTAL_QUESTIONS) {
      setTimeout(() => endGame("complete"), 300);
    }
  };

  const linesLeft = config.maxRows - rows.length;
  const isDanger = linesLeft <= 1;

  // Visual danger pulse (no BGM change)
  const [dangerFlash, setDangerFlash] = useState(false);
  useEffect(() => {
    if (!isDanger || finished || paused) { setDangerFlash(false); return; }
    const id = setInterval(() => setDangerFlash(v => !v), 500);
    return () => clearInterval(id);
  }, [isDanger, finished, paused]);
  const answered = correct + wrong;
  const progressPct = Math.round((answered / TOTAL_QUESTIONS) * 100);
  const timePct = Math.round((timeLeft / config.timeLimit) * 100);
  const timeMin = Math.floor(timeLeft / 60);
  const timeSec = (timeLeft % 60).toString().padStart(2, "0");
  const hasBinary = stage.fromBase === 2 || stage.toBase === 2;
  const numBits = config.bits || 8;
  const cellSize = numBits <= 8 ? "clamp(32px, 9vw, 44px)" : "clamp(24px, 6vw, 34px)";

  if (finished) {
    const msgs = { complete: "문제 완료!", timeout: "시간 종료!", overflow: "게임 오버!" };
    return (
      <div style={{
        minHeight: "100vh", ...skinBg(SKIN.bgStageMap, C.bg), display: "flex", flexDirection: "column",
        alignItems: "center", justifyContent: "center", padding: 20,
      }}>
        <CharAvatar charId={charId} mood={finishReason === "overflow" ? "sad" : "think"} size={80} />
        <h2 style={{ color: finishReason === "overflow" ? C.red : C.navy, margin: "16px 0 8px", fontSize: 24 }}>
          {msgs[finishReason]}
        </h2>
        <p style={{ color: C.gray, fontSize: 14 }}>결과를 집계하고 있어요...</p>
      </div>
    );
  }

  return (
    <div style={{
      minHeight: "100vh", ...skinBg(SKIN.bgGameplay, C.bgAlt), display: "flex", flexDirection: "column",
      padding: "12px 8px",
    }}>
      {/* Header */}
      <div style={{
        display: "flex", justifyContent: "space-between", alignItems: "center",
        marginBottom: 6, padding: "0 4px",
      }}>
        <div style={{ display: "flex", gap: 6 }}>
          {[
            { label: "점수", value: score.toLocaleString(), color: C.navy },
            { label: "Lv", value: level, color: C.mint },
            { label: "남은줄", value: linesLeft, color: linesLeft <= 1 ? C.red : C.amber },
          ].map(item => (
            <div key={item.label} style={{
              background: C.scoreboardBg, borderRadius: 10, padding: "5px 8px", textAlign: "center",
              border: `1.5px solid ${C.scoreboardStroke}`, minWidth: 50,
            }}>
              <div style={{ fontSize: 9, color: C.gray, fontWeight: 600 }}>{item.label}</div>
              <div style={{ fontSize: 15, fontWeight: 700, color: item.color, fontFamily: "'Fira Code', monospace" }}>
                {item.value}
              </div>
            </div>
          ))}
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
          {combo >= 2 && (
            <div style={{
              background: C.amber, color: C.white, borderRadius: 20, padding: "3px 10px",
              fontSize: 11, fontWeight: 700, animation: "pulse 0.6s ease-in-out infinite",
            }}>
              {combo}x COMBO
            </div>
          )}
          <button onClick={() => {
            const next = !sfxOn;
            setSfxOn(next);
            soundEngine.enabled = next;
            if (next) soundEngine.play("click");
          }} style={{
            background: "none", border: `1px solid ${C.lightBorder}`, borderRadius: 8,
            padding: "6px 10px", fontSize: 14, cursor: "pointer",
            color: sfxOn ? C.navy : C.red, fontWeight: 600,
          }}>{sfxOn ? "🔊" : "🔇"}</button>
          <button onClick={() => {
            const next = !bgmOn;
            setBgmOn(next);
            soundEngine.setBgmEnabled(next);
            if (next) soundEngine.playBgm("play");
          }} style={{
            background: "none", border: `1px solid ${C.lightBorder}`, borderRadius: 8,
            padding: "6px 10px", fontSize: 14, cursor: "pointer",
            color: bgmOn ? C.navy : C.red, fontWeight: 600,
          }}>{bgmOn ? "🎵" : "🎵❌"}</button>
          <button onClick={() => { soundEngine.play("click"); setPaused(!paused); clearInterval(intervalRef.current); clearInterval(timerRef.current); soundEngine.pauseBgm(); }} style={{
            background: "none", border: `1px solid ${C.lightBorder}`, borderRadius: 8,
            padding: "6px 10px", fontSize: 18, cursor: "pointer",
          }}>{paused ? "▶" : "⏸"}</button>
          <button onClick={() => { soundEngine.play("click"); clearInterval(intervalRef.current); clearInterval(timerRef.current); onExit(); }} style={{
            background: "none", border: `1px solid ${C.lightBorder}`, borderRadius: 8,
            padding: "6px 10px", fontSize: 11, cursor: "pointer", color: C.red,
          }}>종료</button>
        </div>
      </div>

      {/* Progress + Timer bar */}
      <div style={{
        display: "flex", gap: 8, marginBottom: 6, padding: "0 4px",
      }}>
        <div style={{ flex: 1 }}>
          <div style={{ display: "flex", justifyContent: "space-between", fontSize: 10, color: C.gray, marginBottom: 2 }}>
            <span>진행 {answered}/{TOTAL_QUESTIONS}</span>
            <span>정답 {correct}</span>
          </div>
          <div style={{ height: 6, background: "#e0e7ee", borderRadius: 3, overflow: "hidden" }}>
            <div style={{
              height: "100%", width: `${progressPct}%`, borderRadius: 3,
              background: `linear-gradient(90deg, ${C.mint}, ${C.navy})`,
              transition: "width 0.3s",
            }} />
          </div>
        </div>
        <div style={{ width: 100 }}>
          <div style={{ display: "flex", justifyContent: "space-between", fontSize: 10, marginBottom: 2 }}>
            <span style={{ color: C.gray }}>시간</span>
            <span style={{ color: timeLeft <= 30 ? C.red : C.gray, fontWeight: 600, fontFamily: "'Fira Code', monospace" }}>
              {timeMin}:{timeSec}
            </span>
          </div>
          <div style={{ height: 6, background: "#e0e7ee", borderRadius: 3, overflow: "hidden" }}>
            <div style={{
              height: "100%", width: `${timePct}%`, borderRadius: 3,
              background: timeLeft <= 30 ? C.red : C.amber,
              transition: "width 1s linear",
            }} />
          </div>
        </div>
      </div>

      {/* Guide bar TOP */}
      {hasBinary && config.showGuide && (
        <div style={{
          display: "flex", justifyContent: "flex-start", gap: 2, marginBottom: 0,
          background: C.white, borderRadius: "8px 8px 0 0", padding: "6px 10px",
          border: `1.5px solid ${C.frameStroke}`, borderBottom: "none",
        }}>
          {Array.from({ length: numBits }, (_, i) => Math.pow(2, numBits - 1 - i)).map((v, i) => (
            <div key={i} style={{
              width: cellSize, textAlign: "center",
              fontSize: 11, color: C.navy, fontWeight: 700,
              fontFamily: "'Fira Code', monospace", flexShrink: 0,
            }}>{v}</div>
          ))}
        </div>
      )}

      {/* Game board */}
      <div style={{
        flex: 1, display: "flex", flexDirection: "column-reverse", gap: 3,
        padding: "6px", overflowY: "auto", minHeight: 200,
        background: C.frameBg, borderRadius: hasBinary && config.showGuide ? 0 : 8,
        border: `1.5px solid ${isDanger ? C.red : C.frameStroke}`,
        borderTop: hasBinary && config.showGuide ? "none" : `1.5px solid ${isDanger ? C.red : C.frameStroke}`,
        borderBottom: hasBinary && config.showGuide ? "none" : `1.5px solid ${isDanger ? C.red : C.frameStroke}`,
        position: "relative",
        transition: "background 0.3s",
        ...(dangerFlash ? { background: "rgba(224,112,96,0.025)" } : {}),
      }}>
        {/* Danger line at bottom */}
        {rows.length > 0 && (
          <div style={{
            borderBottom: `2px dashed ${linesLeft <= 1 ? "#ff4444" : "#ff8844"}`,
            margin: "0 0 2px", padding: "0 0 4px", textAlign: "center",
            fontSize: 10, color: linesLeft <= 1 ? "#ff4444" : "#ff8844", fontWeight: 600,
          }}>
            {linesLeft <= 1 ? "⚠ DANGER" : `↑ ${linesLeft} 줄 남음`}
          </div>
        )}

        {/* Rows */}
        {[...rows].reverse().map(row => {
          const isActive = activeRow === row.id;
          const isBitInput = row.inputBase === 2;
          const isBitDisplay = row.answerBase !== 2 && (stage.fromBase === 2 || stage.toBase === 2);

          return (
            <div key={row.id} style={{
              display: "flex", alignItems: "center", gap: 2,
              padding: "4px 4px", borderRadius: 6,
              background: isActive ? "rgba(232,184,100,0.12)" : "rgba(0,0,0,0.02)",
              border: `1px solid ${isActive ? "rgba(232,184,100,0.3)" : "transparent"}`,
              animation: "slideIn 0.3s ease-out",
              minHeight: 52,
            }}
            onClick={() => !isBitInput && setActiveRow(row.id)}
            >
              {/* Type A: dec→bin — toggleable bits + target decimal */}
              {isBitInput && (
                <>
                  <BitToggleRow
                    key={row.id}
                    bits={row.bits}
                    targetDecimal={row.decimal}
                    onCorrect={() => checkAnswer(row.id, row.answer)}
                  />
                  <div style={{ fontSize: 16, color: C.gray, padding: "0 4px" }}>=</div>
                  <div style={{
                    minWidth: 48, height: cellSize, borderRadius: 6,
                    background: C.white, color: C.charcoal,
                    display: "flex", alignItems: "center", justifyContent: "center",
                    fontSize: "clamp(16px, 4vw, 22px)", fontWeight: 700,
                    fontFamily: "'Fira Code', monospace", flexShrink: 0,
                    border: `1.5px solid ${C.frameStroke}`,
                  }}>
                    {row.sourceDisplay}
                  </div>
                </>
              )}

              {/* Type B: bin→dec — fixed bits + answer cell + inline keypad */}
              {!isBitInput && isBitDisplay && (() => {
                const binStr = padBinary(toBase(row.decimal, 2), row.bits);
                return (
                  <>
                    <div style={{ display: "flex", gap: 2 }}>
                      {binStr.split("").map((b, i) => (
                        <div key={i} style={{
                          width: cellSize, height: cellSize,
                          borderRadius: 6, display: "flex", alignItems: "center", justifyContent: "center",
                          background: b === "1" ? C.bit1 : C.bit0,
                          color: b === "1" ? C.white : C.bit0t,
                          fontSize: numBits <= 8 ? "clamp(14px, 3.5vw, 20px)" : "clamp(11px, 2.5vw, 15px)",
                          fontWeight: 700, fontFamily: "'Fira Code', monospace",
                          border: `1px solid ${b === "1" ? "#4A7EA6" : C.lightBorder}`,
                          flexShrink: 0,
                        }}>
                          {b}
                        </div>
                      ))}
                    </div>
                    <div style={{ fontSize: 16, color: C.gray, padding: "0 4px" }}>=</div>
                    {isActive ? (
                      <InlineKeypad base={row.inputBase} onSubmit={(val) => checkAnswer(row.id, val)} />
                    ) : (
                      <div onClick={(e) => { e.stopPropagation(); setActiveRow(row.id); }} style={{
                        minWidth: 48, height: cellSize, borderRadius: 6,
                        background: C.white, color: C.charcoal,
                        display: "flex", alignItems: "center", justifyContent: "center",
                        fontSize: "clamp(16px, 4vw, 22px)", fontWeight: 700,
                        fontFamily: "'Fira Code', monospace", cursor: "pointer", flexShrink: 0,
                      }}>
                        ?
                      </div>
                    )}
                  </>
                );
              })()}

              {/* Type C: non-binary stages */}
              {!isBitInput && !isBitDisplay && (
                <>
                  <div style={{
                    fontSize: "clamp(16px, 4vw, 22px)", fontWeight: 700,
                    color: C.charcoal, fontFamily: "'Fira Code', monospace",
                    background: C.bit0, borderRadius: 6,
                    padding: "8px 14px", flexShrink: 0,
                  }}>
                    {row.question}
                  </div>
                  <div style={{ fontSize: 16, color: C.gray, padding: "0 4px" }}>=</div>
                  {isActive ? (
                    <InlineKeypad base={row.inputBase} onSubmit={(val) => checkAnswer(row.id, val)} />
                  ) : (
                    <div onClick={(e) => { e.stopPropagation(); setActiveRow(row.id); }} style={{
                      minWidth: 56, height: 44, borderRadius: 6,
                      background: C.white, color: C.charcoal,
                      display: "flex", alignItems: "center", justifyContent: "center",
                      fontSize: "clamp(16px, 4vw, 22px)", fontWeight: 700,
                      fontFamily: "'Fira Code', monospace", cursor: "pointer", flexShrink: 0,
                    }}>
                      ?
                    </div>
                  )}
                </>
              )}
            </div>
          );
        })}

        {rows.length === 0 && !paused && (
          <div style={{ textAlign: "center", color: C.gray, padding: 40, fontSize: 14 }}>
            {generatedRef.current >= TOTAL_QUESTIONS ? "모든 문제가 출제되었습니다!" : "문제가 곧 나타납니다..."}
          </div>
        )}
      </div>

      {/* Guide bar BOTTOM (identical to top) */}
      {hasBinary && config.showGuide && (
        <div style={{
          display: "flex", justifyContent: "flex-start", gap: 2, marginTop: 0,
          background: C.white, borderRadius: "0 0 8px 8px", padding: "6px 10px",
          border: `1.5px solid ${C.frameStroke}`, borderTop: "none",
        }}>
          {Array.from({ length: numBits }, (_, i) => Math.pow(2, numBits - 1 - i)).map((v, i) => (
            <div key={i} style={{
              width: cellSize, textAlign: "center",
              fontSize: 11, color: C.navy, fontWeight: 700,
              fontFamily: "'Fira Code', monospace", flexShrink: 0,
            }}>{v}</div>
          ))}
        </div>
      )}

      {/* Character */}
      <div style={{
        display: "flex", justifyContent: "flex-end", padding: "4px 8px",
      }}>
        <CharAvatar charId={charId} mood={mood} size={52} />
      </div>

      {/* Pause overlay */}
      {paused && (
        <div style={{
          position: "fixed", inset: 0, background: "rgba(0,0,0,0.5)",
          display: "flex", alignItems: "center", justifyContent: "center", zIndex: 100,
        }}>
          <div style={{
            background: C.white, borderRadius: 20, padding: 32, textAlign: "center",
            maxWidth: 300, width: "90%",
          }}>
            <h3 style={{ margin: "0 0 16px", color: C.navy }}>일시정지</h3>
            <div style={{ fontSize: 13, color: C.gray, marginBottom: 16 }}>
              {answered}/{TOTAL_QUESTIONS}문제 · {timeMin}:{timeSec} 남음
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              <button onClick={() => {
                setPaused(false);
                soundEngine.resumeBgm();
                intervalRef.current = setInterval(addRow, config.interval);
                timerRef.current = setInterval(() => {
                  setTimeLeft(prev => { if (prev <= 1) { endGame("timeout"); return 0; } return prev - 1; });
                }, 1000);
              }} style={{
                background: C.btn, color: C.white, border: "none", borderRadius: 12,
                padding: "12px 24px", fontSize: 16, fontWeight: 700, cursor: "pointer",
              }}>계속하기</button>
              <button onClick={() => { clearInterval(intervalRef.current); clearInterval(timerRef.current); onExit(); }} style={{
                background: "none", border: `1px solid ${C.lightBorder}`, borderRadius: 12,
                padding: "12px 24px", fontSize: 14, cursor: "pointer", color: C.gray,
              }}>게임 종료</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// RESULT SCREEN
// ═══════════════════════════════════════════════════════════════
function ResultScreen({ result, stageId, level, charId, save, onSave, onRetry, onNext, onStageMap }) {
  const stars = getStars(result.accuracy);
  const cleared = result.cleared;
  const reasonText = { complete: "15문제 완료", timeout: "시간 초과", overflow: "남은 줄 소진" };

  useEffect(() => {
    if (cleared) soundEngine.play("levelclear");
  }, []);

  useEffect(() => {
    const ns = { ...save };
    const ld = ns.stages[stageId].levels[level];
    if (result.score > ld.high) ld.high = result.score;
    if (stars > ld.stars) ld.stars = stars;
    if (cleared) ld.cleared = true;
    onSave(ns);
  }, []);

  return (
    <div style={{
      minHeight: "100vh", ...skinBg(SKIN.bgResult, C.bg),
      display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
      padding: 20, textAlign: "center",
    }}>
      <CharAvatar charId={charId} mood={cleared ? "cheer" : "think"} size={80} />
      <h2 style={{
        fontSize: "clamp(22px, 5vw, 32px)", fontWeight: 800,
        color: cleared ? C.navy : C.red, margin: "16px 0 8px",
      }}>
        {cleared ? "레벨 클리어!" : "아쉬워요..."}
      </h2>
      {cleared && (
        <div style={{ fontSize: 32, marginBottom: 12 }}>
          {"★".repeat(stars)}{"☆".repeat(3 - stars)}
        </div>
      )}
      <div style={{
        background: C.white, borderRadius: 16, padding: 20, maxWidth: 300, width: "100%",
        boxShadow: "0 2px 12px rgba(0,0,0,0.06)", marginBottom: 24,
        border: `1px solid ${C.lightBorder}`,
      }}>
        {[
          { label: "종료 사유", value: reasonText[result.reason] || "완료" },
          { label: "최종 점수", value: `${result.score.toLocaleString()}점` },
          { label: "정답률", value: `${result.accuracy}% (${result.correct}/${result.totalQuestions}문제)` },
          { label: "최대 콤보", value: `${result.maxCombo}연속` },
        ].map(item => (
          <div key={item.label} style={{
            display: "flex", justifyContent: "space-between", padding: "8px 0",
            borderBottom: `1px solid ${C.lightBorder}`,
          }}>
            <span style={{ color: C.gray, fontSize: 14 }}>{item.label}</span>
            <span style={{ fontWeight: 700, color: C.charcoal, fontSize: 14 }}>{item.value}</span>
          </div>
        ))}
      </div>
      {!cleared && (
        <p style={{ color: C.gray, fontSize: 13, marginBottom: 16 }}>
          15문제 중 11문제 이상 정답(70%)이면 클리어!
        </p>
      )}
      <div style={{ display: "flex", gap: 10, flexWrap: "wrap", justifyContent: "center" }}>
        <button onClick={() => { soundEngine.play("click"); onRetry(); }} style={{
          background: C.white, color: C.btn, border: `1.5px solid ${C.btn}`,
          borderRadius: 12, padding: "12px 24px", fontSize: 15, fontWeight: 600, cursor: "pointer",
        }}>다시 하기</button>
        {cleared && level < 5 && (
          <button onClick={() => { soundEngine.play("click"); onNext(); }} style={{
            background: C.btn, color: C.white, border: "none",
            borderRadius: 12, padding: "12px 24px", fontSize: 15, fontWeight: 700, cursor: "pointer",
            boxShadow: "0 4px 16px rgba(44,62,107,0.3)",
          }}>다음 레벨 →</button>
        )}
        <button onClick={() => { soundEngine.play("click"); onStageMap(); }} style={{
          background: "none", color: C.gray, border: `1px solid ${C.lightBorder}`,
          borderRadius: 12, padding: "12px 24px", fontSize: 14, cursor: "pointer",
        }}>스테이지 선택</button>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════════════════════
function App() {
  const [screen, setScreen] = useState("landing");
  const [save, setSave] = useState(getInitialSave);
  const [currentStage, setCurrentStage] = useState(1);
  const [currentLevel, setCurrentLevel] = useState(1);
  const [result, setResult] = useState(null);

  const charId = save.character || "eobot";

  const updateSave = (ns) => { setSave(ns); saveToDisk(ns); };

  // BGM switching based on screen
  useEffect(() => {
    switch (screen) {
      case "landing":
      case "characterSelect":
      case "stageMap":
      case "levelSelect":
        soundEngine.playBgm("menu"); break;
      case "tutorial":
        soundEngine.playBgm("menu"); break;
      case "gameplay":
        soundEngine.playBgm("play"); break;
      case "result":
        soundEngine.stopBgm();
        soundEngine.playBgm("result"); break;
      default: break;
    }
  }, [screen]);

  const [tutorialSeenThisSession, setTutorialSeenThisSession] = useState({});

  const startLevel = (stageId, lv) => {
    setCurrentStage(stageId);
    setCurrentLevel(lv);
    if (!tutorialSeenThisSession[stageId]) {
      setScreen("tutorial");
    } else {
      setScreen("gameplay");
    }
  };

  return (
    <div style={{ fontFamily: "'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif", minHeight: "100vh" }}>

      {screen === "landing" && (
        <LandingScreen onStart={() => {
          setScreen("characterSelect");
        }} />
      )}

      {screen === "characterSelect" && (
        <CharacterSelect
          selected={save.character}
          onSelect={(id) => {
            const ns = { ...save, character: id };
            updateSave(ns);
            setScreen("stageMap");
          }}
        />
      )}

      {screen === "stageMap" && (
        <StageMap
          save={save}
          charId={charId}
          onStageSelect={(id) => { setCurrentStage(id); setScreen("levelSelect"); }}
          onHome={() => setScreen("characterSelect")}
        />
      )}

      {screen === "levelSelect" && (
        <LevelSelect
          stageId={currentStage}
          save={save}
          charId={charId}
          onLevelSelect={(lv) => startLevel(currentStage, lv)}
          onBack={() => setScreen("stageMap")}
        />
      )}

      {screen === "tutorial" && (
        <TutorialScreen
          stageId={currentStage}
          charId={charId}
          onComplete={() => {
            setTutorialSeenThisSession(prev => ({ ...prev, [currentStage]: true }));
            setScreen("gameplay");
          }}
        />
      )}

      {screen === "gameplay" && (
        <GamePlay
          key={`${currentStage}-${currentLevel}-${Date.now()}`}
          stageId={currentStage}
          level={currentLevel}
          charId={charId}
          save={save}
          onResult={(r) => { setResult(r); setScreen("result"); }}
          onExit={() => setScreen("levelSelect")}
        />
      )}

      {screen === "result" && result && (
        <ResultScreen
          result={result}
          stageId={currentStage}
          level={currentLevel}
          charId={charId}
          save={save}
          onSave={updateSave}
          onRetry={() => setScreen("gameplay")}
          onNext={() => { setCurrentLevel(l => l + 1); setScreen("gameplay"); }}
          onStageMap={() => setScreen("stageMap")}
        />
      )}
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
